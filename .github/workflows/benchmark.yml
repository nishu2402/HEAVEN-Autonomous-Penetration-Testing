name: Benchmark — HEAVEN vs. DVWA

# Benchmarks pull Docker images and take minutes. Run weekly and on-demand,
# not on every push.
on:
  schedule:
    - cron: "0 6 * * 1"   # Mondays 06:00 UTC
  workflow_dispatch:
    inputs:
      runs:
        description: "Number of scan runs to aggregate"
        required: false
        default: "3"

jobs:
  dvwa-benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install HEAVEN
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pyyaml

      - name: Verify Docker is available
        run: |
          docker --version
          docker compose version

      - name: Pull DVWA image (so the scan timer doesn't include image pull)
        run: docker pull vulnerables/web-dvwa:latest

      - name: Run benchmark
        env:
          HEAVEN_RUN_BENCHMARKS: "1"
          HEAVEN_BENCH_RUNS: ${{ inputs.runs || '3' }}
          HEAVEN_BENCH_SCAN_TIMEOUT: "900"
        run: |
          pytest tests/benchmarks/test_dvwa_baseline.py -v -s \
            --junit-xml=benchmark-results.xml

      - name: Upload benchmark reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dvwa-benchmark-${{ github.run_id }}
          path: |
            tests/benchmarks/reports/
            benchmark-results.xml
          retention-days: 90

      - name: Print headline numbers to job summary
        if: always()
        run: |
          if [ -f tests/benchmarks/reports/dvwa_aggregated.md ]; then
            echo "## DVWA benchmark — aggregated" >> "$GITHUB_STEP_SUMMARY"
            cat tests/benchmarks/reports/dvwa_aggregated.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No aggregated report produced. See artifact for raw logs." >> "$GITHUB_STEP_SUMMARY"
          fi
