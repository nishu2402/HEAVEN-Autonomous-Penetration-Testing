name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff
        run: ruff check heaven/ tests/

  type-check:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    continue-on-error: true  # mypy not enforced yet — surface issues without blocking
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install mypy + project
        run: |
          pip install --upgrade pip
          pip install mypy types-PyYAML types-requests
          pip install -e .
      - name: Run mypy
        run: mypy --ignore-missing-imports --no-strict-optional heaven/

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install project + dev deps
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
          pip install hypothesis pytest-cov httpx
      - name: Run pytest
        run: pytest tests/ -v --cov=heaven --cov-report=xml --cov-report=term-missing
      - name: Check README test count is in sync
        if: matrix.python-version == '3.12'
        run: python scripts/sync_test_count.py --check
      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
        continue-on-error: true

  security-deps:
    name: Dependency audit (pip-audit)
    runs-on: ubuntu-latest
    continue-on-error: true  # informational; vulns in deps shouldn't always block merge
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Run pip-audit
        run: pip-audit -r requirements.txt --strict --desc

  security-code:
    name: SAST (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install bandit
        run: pip install "bandit[toml,sarif]"
      - name: Run bandit
        run: bandit -r heaven/ -l -f sarif -o bandit.sarif -c pyproject.toml
        continue-on-error: true
      - name: Upload SARIF to GitHub code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: bandit.sarif
        continue-on-error: true

  self-audit:
    name: HEAVEN self-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install project
        run: |
          pip install --upgrade pip
          pip install -e .
      - name: Run self-audit
        env:
          HEAVEN_ADMIN_PASSWORD: ci-admin-password-not-real
          HEAVEN_DB_PASSWORD: ci-db-password-not-real
        run: |
          python -m heaven.main self-audit -o self-audit-report.json
          python -c "
          import json, sys
          r = json.load(open('self-audit-report.json'))
          print(f\"Score: {r['score']}/100  Grade: {r['grade']}\")
          if r['severity_breakdown'].get('critical', 0) > 0:
              sys.exit(1)
          if r['severity_breakdown'].get('high', 0) > 0:
              sys.exit(1)
          "
      - name: Upload self-audit report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: self-audit-report
          path: self-audit-report.json

  ui-build:
    name: Web UI build (vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          # Node 22 (active LTS): Vite 8 needs >=20.19/>=22.12; Node 20 is EOL.
          node-version: "22"
          cache: npm
          cache-dependency-path: heaven-ui/package-lock.json
      - name: Install UI deps
        working-directory: heaven-ui
        run: npm ci
      - name: Build the React UI
        working-directory: heaven-ui
        run: npm run build
      - name: Upload built UI
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: heaven-ui-dist
          path: heaven-ui/dist
          if-no-files-found: error

  powershell-lint:
    name: Windows installer lint (PSScriptAnalyzer)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - name: Parse-check the .ps1 installers
        shell: pwsh
        run: |
          # A parse error means the script is broken syntax — fail hard. This is
          # the guard that catches Windows-only bugs the macOS/Linux dev host
          # can't execute-test.
          $failed = $false
          foreach ($f in 'scripts/install.ps1', 'scripts/uninstall.ps1') {
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              (Resolve-Path $f), [ref]$null, [ref]$errors) | Out-Null
            if ($errors) {
              Write-Host "Parse errors in $f :" -ForegroundColor Red
              $errors | ForEach-Object { Write-Host "  line $($_.Extent.StartLineNumber): $($_.Message)" }
              $failed = $true
            } else {
              Write-Host "OK: $f parses cleanly"
            }
          }
          if ($failed) { exit 1 }
      - name: PSScriptAnalyzer (fail on errors, warnings informational)
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser -SkipPublisherCheck
          # Write-Host is intentional for a colored installer UX, so its style
          # warning is excluded; block only on genuine Error/ParseError findings.
          $errors = @()
          foreach ($f in 'scripts/install.ps1', 'scripts/uninstall.ps1') {
            $all = Invoke-ScriptAnalyzer -Path $f -ExcludeRule PSAvoidUsingWriteHost
            $all | Format-Table -AutoSize
            $errors += $all | Where-Object { $_.Severity -in 'Error', 'ParseError' }
          }
          if ($errors) {
            Write-Host "PSScriptAnalyzer found $($errors.Count) error(s)." -ForegroundColor Red
            exit 1
          }
          Write-Host "PSScriptAnalyzer: no errors." -ForegroundColor Green

  windows-install-e2e:
    name: Windows install/uninstall E2E (native)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: heaven-ui/package-lock.json
      # Actually EXECUTE install.ps1 on real Windows — the one thing a macOS/Linux
      # dev host cannot do. -SkipTools avoids pulling heavyweight system packages
      # (Docker Desktop, etc.) onto the runner, but everything else runs natively:
      # the venv, the full editable pip install + feature packs, the user-PATH
      # wiring, the `cmd /c npm` web-UI build, .env generation, and the smoke test.
      - name: Run install.ps1 (native Windows)
        shell: pwsh
        run: |
          ./scripts/install.ps1 -SkipTools
          if ($LASTEXITCODE -ne 0) { throw "install.ps1 exited with $LASTEXITCODE" }
      - name: Verify the installed CLI runs and .env was created
        shell: pwsh
        run: |
          $heaven = Join-Path (Get-Location) 'venv\Scripts\heaven.exe'
          if (-not (Test-Path $heaven)) { throw "heaven.exe missing at $heaven" }
          & $heaven --version
          if ($LASTEXITCODE -ne 0) { throw "heaven --version failed" }
          if (-not (Test-Path '.env')) { throw ".env was not created by step 8" }
          Write-Host "install.ps1 OK: CLI runs, .env present" -ForegroundColor Green
      - name: Run uninstall.ps1 and assert it preserves user data
        shell: pwsh
        run: |
          # Seed a non-empty engagements dir; the uninstaller must KEEP it.
          New-Item -ItemType Directory -Force -Path 'engagements' | Out-Null
          Set-Content -Path 'engagements/keep.db' -Value 'user-data'
          ./scripts/uninstall.ps1
          if ($LASTEXITCODE -ne 0) { throw "uninstall.ps1 exited with $LASTEXITCODE" }
          if (Test-Path 'venv') { throw "uninstall.ps1 left the venv behind" }
          if (-not (Test-Path 'engagements/keep.db')) { throw "uninstall.ps1 DELETED user data" }
          Write-Host "Native Windows install -> uninstall E2E passed" -ForegroundColor Green

  docker-build:
    name: Docker image build
    runs-on: ubuntu-latest
    needs: [lint, test, ui-build]
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v4
      - name: Build image (load into local daemon)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true            # make the image available to `docker run` below
          tags: heaven:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Smoke-test the built image
        # Building isn't enough — a broken install path produces an image that
        # builds fine but crashes on startup. Actually run it to prove the
        # `heaven` entry point imports and executes.
        run: |
          docker run --rm heaven:ci-${{ github.sha }} heaven --version
          docker run --rm heaven:ci-${{ github.sha }} heaven --help | head -5
