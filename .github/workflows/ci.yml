name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff
        run: ruff check heaven/ tests/

  type-check:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    continue-on-error: true  # mypy not enforced yet — surface issues without blocking
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install mypy + project
        run: |
          pip install --upgrade pip
          pip install mypy types-PyYAML types-requests
          pip install -e .
      - name: Run mypy
        run: mypy --ignore-missing-imports --no-strict-optional heaven/

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install project + dev deps
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
          pip install hypothesis pytest-cov httpx
      - name: Run pytest
        run: pytest tests/ -v --cov=heaven --cov-report=xml --cov-report=term-missing
      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
        continue-on-error: true

  security-deps:
    name: Dependency audit (pip-audit)
    runs-on: ubuntu-latest
    continue-on-error: true  # informational; vulns in deps shouldn't always block merge
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Run pip-audit
        run: pip-audit -r requirements.txt --strict --desc

  security-code:
    name: SAST (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install bandit
        run: pip install "bandit[toml,sarif]"
      - name: Run bandit
        run: bandit -r heaven/ -ll -f sarif -o bandit.sarif -c pyproject.toml
        continue-on-error: true
      - name: Upload SARIF to GitHub code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: bandit.sarif
        continue-on-error: true

  self-audit:
    name: HEAVEN self-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install project
        run: |
          pip install --upgrade pip
          pip install -e .
      - name: Run self-audit
        env:
          HEAVEN_ADMIN_PASSWORD: ci-admin-password-not-real
          HEAVEN_DB_PASSWORD: ci-db-password-not-real
        run: |
          python -m heaven.main self-audit -o self-audit-report.json
          python -c "
          import json, sys
          r = json.load(open('self-audit-report.json'))
          print(f\"Score: {r['score']}/100  Grade: {r['grade']}\")
          if r['severity_breakdown'].get('critical', 0) > 0:
              sys.exit(1)
          if r['severity_breakdown'].get('high', 0) > 0:
              sys.exit(1)
          "
      - name: Upload self-audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: self-audit-report
          path: self-audit-report.json

  docker-build:
    name: Docker image build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: heaven:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
