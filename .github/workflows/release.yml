name: Release — build + GitHub Release

# Trigger:
#   - Push a tag matching v* (e.g. v1.0.1, v2.0.0-rc1)
#   - Manual workflow_dispatch for dry-runs
#
# What it does:
#   1. Build sdist + wheel
#   2. Verify the wheel installs and `heaven --version` runs
#   3. Create a GitHub Release with the wheel + sdist attached
#
# NOTE: HEAVEN is NOT published to PyPI. Distribution is via GitHub Releases
# (and installing from source with `pip install -e .`). There is deliberately
# no PyPI upload step here.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build only — skip the GitHub Release"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]

permissions:
  contents: write    # for GitHub Release creation

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # full history so setuptools_scm-style version logic works

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip build twine

      - name: Build distributions
        run: python -m build

      - name: Verify wheel installs cleanly
        run: |
          python -m venv /tmp/verify-venv
          /tmp/verify-venv/bin/pip install --upgrade pip
          /tmp/verify-venv/bin/pip install dist/*.whl
          /tmp/verify-venv/bin/heaven --version
          /tmp/verify-venv/bin/heaven --help | head -5

      - name: Validate distribution metadata (no upload)
        run: twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: dist
          path: dist/
          retention-days: 14

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist/

      - name: Extract version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog section for this version
        id: changelog
        run: |
          # Grab everything between this version's heading and the next ## heading
          awk -v ver="${{ steps.ver.outputs.version }}" '
            $0 ~ "^## \\[" ver "\\]" {flag=1; next}
            flag && /^## \[/ {exit}
            flag {print}
          ' CHANGELOG.md > /tmp/release-notes.md
          if [ ! -s /tmp/release-notes.md ]; then
            echo "No CHANGELOG entry for version ${{ steps.ver.outputs.version }} — using fallback" >&2
            echo "See CHANGELOG.md for changes." > /tmp/release-notes.md
          fi
          # Append install + pre-trained-model instructions. HEAVEN is distributed
          # via this Release (not PyPI): grab the wheel below, or install from source.
          # The 48 MB NVD model is not in the wheel/git, so users grab it from this
          # release with a SHA-256-verified one-liner.
          {
            echo ""
            echo "### Install"
            echo ""
            echo "HEAVEN is distributed here, not on PyPI. Install the attached wheel:"
            echo ""
            echo '```bash'
            echo "pip install heaven_pentest-${{ steps.ver.outputs.version }}-py3-none-any.whl"
            echo '```'
            echo ""
            echo "…or from source: \`git clone\` + \`pip install -e .\`."
            echo ""
            echo "### Pre-trained NVD CVSS model"
            echo ""
            echo "The ML CVSS model (R²≈0.99) ships as a release asset, not in the wheel."
            echo "Fetch it once (SHA-256 verified):"
            echo ""
            echo '```bash'
            echo "heaven download-model --tag ${{ github.ref_name }}"
            echo '```'
            echo ""
            echo "HEAVEN runs without it (CVSS falls back to each finding's base score)."
          } >> /tmp/release-notes.md
          head -40 /tmp/release-notes.md

      # NOTE: NVD_model.pkl is gitignored, so CI does not have it — the glob
      # below is skipped automatically (fail_on_unmatched_files defaults false).
      # ONE-TIME per release, the maintainer uploads data/models/NVD_model.pkl to
      # the created GitHub Release (drag-drop in the UI, or `gh release upload
      # <tag> data/models/NVD_model.pkl`) so `heaven download-model` can fetch it.
      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          name: "HEAVEN v${{ steps.ver.outputs.version }}"
          body_path: /tmp/release-notes.md
          files: |
            dist/*
            data/models/NVD_model.pkl
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}   # tag like v1.0.0-rc1 → prerelease
