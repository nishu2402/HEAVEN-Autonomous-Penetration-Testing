name: Release — PyPI + GitHub Release

# Trigger:
#   - Push a tag matching v* (e.g. v1.0.1, v2.0.0-rc1)
#   - Manual workflow_dispatch for dry-runs
#
# What it does:
#   1. Build sdist + wheel
#   2. Verify the wheel installs and `heaven --version` runs
#   3. Publish to PyPI via OIDC trusted-publishing (no API token in secrets)
#   4. Create a GitHub Release with the wheel + sdist attached
#
# One-time setup (operator):
#   1. PyPI: configure the project as a "Trusted Publisher" pointing at this
#      workflow. https://docs.pypi.org/trusted-publishers/
#   2. Optionally set GITHUB_TOKEN to allow Release creation (default works).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build only — skip PyPI + Release"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]

permissions:
  contents: write    # for GitHub Release creation
  id-token: write    # for PyPI OIDC

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so setuptools_scm-style version logic works

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip build twine

      - name: Build distributions
        run: python -m build

      - name: Verify wheel installs cleanly
        run: |
          python -m venv /tmp/verify-venv
          /tmp/verify-venv/bin/pip install --upgrade pip
          /tmp/verify-venv/bin/pip install dist/*.whl
          /tmp/verify-venv/bin/heaven --version
          /tmp/verify-venv/bin/heaven --help | head -5

      - name: Check distributions with twine
        run: twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 14

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' || inputs.dry_run == 'false'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      # OIDC trusted-publishing — no token needed once configured at pypi.org
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish-pypi
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Extract version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog section for this version
        id: changelog
        run: |
          # Grab everything between this version's heading and the next ## heading
          awk -v ver="${{ steps.ver.outputs.version }}" '
            $0 ~ "^## \\[" ver "\\]" {flag=1; next}
            flag && /^## \[/ {exit}
            flag {print}
          ' CHANGELOG.md > /tmp/release-notes.md
          if [ ! -s /tmp/release-notes.md ]; then
            echo "No CHANGELOG entry for version ${{ steps.ver.outputs.version }} — using fallback" >&2
            echo "See CHANGELOG.md for changes." > /tmp/release-notes.md
          fi
          head -30 /tmp/release-notes.md

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "HEAVEN v${{ steps.ver.outputs.version }}"
          body_path: /tmp/release-notes.md
          files: dist/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}   # tag like v1.0.0-rc1 → prerelease
