apiVersion: v1
kind: Secret
metadata:
  name: {{ include "heaven.secretName" . }}
  labels:
    {{- include "heaven.labels" . | nindent 4 }}
type: Opaque
stringData:
  HEAVEN_ADMIN_PASSWORD: {{ required "secrets.adminPassword is required" .Values.secrets.adminPassword | quote }}
  HEAVEN_DB_PASSWORD: {{ required "secrets.dbPassword is required" .Values.secrets.dbPassword | quote }}
  {{- if .Values.secrets.llmProvider }}
  HEAVEN_LLM_PROVIDER: {{ .Values.secrets.llmProvider | quote }}
  {{- end }}
  {{- if .Values.secrets.anthropicKey }}
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicKey | quote }}
  {{- end }}
  {{- if .Values.secrets.openaiKey }}
  OPENAI_API_KEY: {{ .Values.secrets.openaiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.geminiKey }}
  GEMINI_API_KEY: {{ .Values.secrets.geminiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.nvdKey }}
  HEAVEN_NVD_API_KEY: {{ .Values.secrets.nvdKey | quote }}
  {{- end }}
  {{- if .Values.secrets.shodanKey }}
  HEAVEN_SHODAN_API_KEY: {{ .Values.secrets.shodanKey | quote }}
  {{- end }}
  {{- if .Values.secrets.webhookUrl }}
  WEBHOOK_URL: {{ .Values.secrets.webhookUrl | quote }}
  {{- end }}
  {{- if .Values.secrets.splunkHecUrl }}
  HEAVEN_SPLUNK_HEC_URL: {{ .Values.secrets.splunkHecUrl | quote }}
  {{- end }}
  {{- if .Values.secrets.splunkHecToken }}
  HEAVEN_SPLUNK_HEC_TOKEN: {{ .Values.secrets.splunkHecToken | quote }}
  {{- end }}
  {{- if .Values.secrets.elasticUrl }}
  HEAVEN_ELASTIC_URL: {{ .Values.secrets.elasticUrl | quote }}
  {{- end }}
  {{- if .Values.secrets.elasticApiKey }}
  HEAVEN_ELASTIC_API_KEY: {{ .Values.secrets.elasticApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.jiraUrl }}
  HEAVEN_JIRA_URL: {{ .Values.secrets.jiraUrl | quote }}
  {{- end }}
  {{- if .Values.secrets.jiraUser }}
  HEAVEN_JIRA_USER: {{ .Values.secrets.jiraUser | quote }}
  {{- end }}
  {{- if .Values.secrets.jiraToken }}
  HEAVEN_JIRA_TOKEN: {{ .Values.secrets.jiraToken | quote }}
  {{- end }}
  {{- if .Values.secrets.jiraProject }}
  HEAVEN_JIRA_PROJECT: {{ .Values.secrets.jiraProject | quote }}
  {{- end }}
  {{- if .Values.secrets.linearToken }}
  HEAVEN_LINEAR_TOKEN: {{ .Values.secrets.linearToken | quote }}
  {{- end }}
  {{- if .Values.secrets.linearTeamId }}
  HEAVEN_LINEAR_TEAM_ID: {{ .Values.secrets.linearTeamId | quote }}
  {{- end }}
