[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "heaven"
version = "1.0.0"
description = "HEAVEN — Automated Infrastructure & Application Vulnerability Scanner and Risk Triage Platform"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.11"
authors = [
    {name = "HEAVEN Project", email = "heaven@pentest.local"}
]
keywords = ["security", "pentesting", "vulnerability-scanner", "devsecops"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Topic :: Security",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]

dependencies = [
    # Core async
    "uvloop>=0.19.0; sys_platform != 'win32'",
    "aiohttp>=3.9.0",
    "aiofiles>=23.2.0",
    # Database
    "asyncpg>=0.29.0",
    "sqlalchemy[asyncio]>=2.0.0",
    # API server
    "fastapi>=0.110.0",
    "uvicorn[standard]>=0.27.0",
    "websockets>=12.0",
    "slowapi>=0.1.9",
    # ML / Data — xgboost-cpu avoids the 300+MB nvidia-nccl wheel; macOS still gets full xgboost
    "scikit-learn>=1.4.0",
    "xgboost-cpu>=2.0.0; sys_platform != 'darwin'",
    "xgboost>=2.0.0; sys_platform == 'darwin'",
    "numpy>=1.26.0",
    "pandas>=2.2.0",
    "joblib>=1.3.0",
    # Recon tools
    "scapy>=2.5.0",
    "beautifulsoup4>=4.12.0",
    "lxml>=5.1.0",
    # Cloud SDKs
    "boto3>=1.34.0",
    # Utilities
    "pydantic>=2.6.0",
    "pydantic-settings>=2.1.0",
    "rich>=13.7.0",
    "click>=8.1.0",
    "python-dotenv>=1.0.0",
    "httpx>=0.27.0",
    "hypothesis>=6.152.4",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "pytest-cov>=4.1.0",
    "black>=24.0.0",
    "ruff>=0.2.0",
]
cloud-gcp = ["google-cloud-compute>=1.17.0", "google-cloud-storage>=2.14.0"]
cloud-azure = ["azure-mgmt-compute>=30.0.0", "azure-mgmt-storage>=21.0.0"]

[project.scripts]
heaven = "heaven.main:cli"

[tool.setuptools.packages.find]
include = ["heaven*"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py311"
