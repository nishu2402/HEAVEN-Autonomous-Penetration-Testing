# HEAVEN benchmark — DVWA target stack
#
# Brings up DVWA on http://localhost:8080. The image bundles MariaDB so
# no separate DB service is needed.
#
# Pinned to `vulnerables/web-dvwa` — the canonical DockerHub image, used
# in every academic DVWA-based study since 2017. For reproducibility,
# the GitHub Actions workflow resolves the @sha256 digest and pins it.

services:
  dvwa:
    image: vulnerables/web-dvwa:latest
    container_name: heaven-bench-dvwa
    ports:
      # SECURITY: bind to loopback ONLY. DVWA is deliberately vulnerable
      # (SQLi / command-injection → RCE, default admin/password creds). A bare
      # "8080:80" publishes it on 0.0.0.0, so anyone on the LAN — or the
      # internet if the host is exposed — could pop the machine running the
      # benchmark. The benchmark only ever reaches it via localhost:8080.
      - "127.0.0.1:8080:80"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/login.php"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    restart: "no"
